include:
  - local: '.gitlab-ci-template.yml'
  - project: clops/gitlab-ci-pop-analysis
    ref: master
    file: pop_analysis.yaml
  - project: releng/common-gitlab-ci
    ref: master
    file: report-generator.yml
  - project: altair/altair-build-common
    ref: master
    file: gitlab/ci/altair_versioning.yml
  - project: altair/altair-build-common
    ref: master
    file: gitlab/ci/altair_common.yml

# List of job stages in their order of execution.
stages:
  - build
  - contract_test
  - coverage_report
#  - Check_dist
#  - changelog
  - analysis
  - sbom
  - notification


variables:
  BUILD_TOOL: npm
  GIT_DEPTH: 10
  BD_PRODUCT_GROUP: PolarisNG Projects Group
  BD_VERSION_PHASE: DEVELOPMENT
  DISABLE_POLARIS_CLASSIC_ANALYSIS: "true"

##### MERGE REQUEST PIPELINE #####

build_unit_test_job:
  extends:
    - .build_unit_tests
  stage: build

contract_test_job:
  extends:
    - .contract_tests
  stage: build
  allow_failure: true

code_coverage_job:
  stage: coverage_report
  extends:
    -  .code_coverage

#check_dist_job:
#  extends:
#    - .check_dist
#  stage: Check_dist

.export_sbom_variables:
  before_script:
    - export PACKAGE_VERSION=$(cat package.json | grep version | head -1 | awk -F= "{ print $2 }" | sed 's/[version:,\",]//g' | tr -d '[[:space:]]')
    - export ARTIFACTORY_UPLOAD_REPO=1
    - export SBOM_ART_TOKEN_VAULT_PATH=sbom/integrations/blackduck-security-action
    - export PRODUCT=Integrations
    - export GENERATE_CONFIGURATION_FILE=1
    - export GENERATION_OPTIONS="--entry integrations/mirrored-repos/blackduck-security-action:blackduck-security-action-$PACKAGE_VERSION"
    - export PRODUCT_ADDON_SBOM_OPTIONS="--output-zipfile blackduck-security-action-$PACKAGE_VERSION-{report_type}.zip --artifactory-repo integrations-sbom/blackduck-security-action"

generate_sbom:
  image: releng/base-gitlab-runner:jdk17-python3.11-git-docker
  extends:
    - .export_sbom_variables
    - .run_sbom_generation
  stage: sbom
  only:
    refs:
      - main

polaris_bridge:
  image: releng/base-gitlab-runner:jdk17-python3.11-git
  extends: .polaris_bridge
  stage: analysis
  before_script:
    - |
      apt-get update -y
      apt-get install -y make
      export DETECT_ACCURACY_REQUIRED=NONE

new_pop_blackduck:
  stage: analysis
  image: releng/base-gitlab-runner:jdk17-python3.11-git-docker
  dependencies:
    - build_unit_test_job
  variables:
    DETECT_NPM_DEPENDENCY_TYPES_EXCLUDED: "DEV"
  extends:
    - .retry
    - .new_pop_blackduck
  tags:
    - dind
  before_script:
    - |
      # Remove broken PPAs before updating
      rm -f /etc/apt/sources.list.d/deadsnakes-ubuntu-ppa-focal.list
      rm -f /etc/apt/sources.list.d/openjdk-r-ubuntu-ppa-focal.list
      apt-get update -y
      apt-get install -y rsync make jq python3 python3-pip
      pip3 install blackduck requests
      echo "Installing node js 22."
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
      \. "$HOME/.nvm/nvm.sh"
      nvm install 22
      export RELEASE_VERSION=$(cat package.json | grep version | head -1 | awk -F= "{ print $2 }" | sed 's/[version:,\",]//g' | tr -d '[[:space:]]')
  rules:
    - if: ($CI_COMMIT_BRANCH == "main")
      when: on_success